name: Build Android APK (v1.14[beta])

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout repository code
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup pnpm package manager
      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # 3. Setup Node.js environment with pnpm caching
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: mobile/pnpm-lock.yaml

      # 4. Setup Java Development Kit (JDK) for Android build
      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 5. Install dependencies inside mobile folder using pnpm
      - name: 📦 Install Dependencies
        working-directory: mobile
        run: pnpm install --frozen-lockfile

      # 6. Install Expo and EAS CLI globally
      - name: 🛠️ Install EAS CLI
        run: npm install -g eas-cli

      # 7. Setup Expo Credentials Token (For EAS services / updates matching)
      - name: 🔑 Setup Expo Token
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # 8. Compile APK using EAS Build (Cloud Runner)
      # Nota: Se compila usando el profile 'preview' para generar el archivo APK instalable.
      - name: 🚀 Build APK via EAS
        working-directory: mobile
        run: eas build --platform android --profile preview --non-interactive
